# Publish to npm when version in package.json is bumped and pushed to main.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
# One-time setup: npmjs.com → Your package → Settings → Trusted publishing →
#   Add GitHub Actions, workflow filename: publish-npm.yml
name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'

permissions:
  id-token: write   # Required for npm Trusted Publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version
        id: version
        run: echo "current=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get published version
        id: published
        run: |
          PUBLISHED=$(npm view rate-queue version 2>/dev/null || echo "0.0.0")
          echo "version=$PUBLISHED" >> $GITHUB_OUTPUT

      - name: Check if version bump
        id: check
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          PUBLISHED="${{ steps.published.outputs.version }}"
          # Publish only if current > published (version sort)
          if [ "$(printf '%s\n' "$CURRENT" "$PUBLISHED" | sort -V | tail -1)" = "$CURRENT" ] && [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip (no version bump)
        if: steps.check.outputs.publish != 'true'
        run: echo "Version ${{ steps.version.outputs.current }} not greater than published ${{ steps.published.outputs.version }}, skipping npm publish"

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --provenance --access public
